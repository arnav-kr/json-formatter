  <style>
    .about-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 10px 0;
      text-align: center;
    }

    .app-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
      border-radius: 10px;
    }

    .app-name {
      font-size: 1.1rem;
      font-weight: 500;
      margin: 0;
    }

    .app-version {
      font-size: 0.85rem;
      color: #5f6368;
    }

    .social-row {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .social-icon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: rgba(32, 33, 36, 0.06);
      transition: all 0.2s ease;
    }

    .social-icon-link:hover {
      background-color: rgba(26, 115, 232, 0.15);
    }

    .social-icon-link:hover .brand-icon {
      fill: #1a73e8;
    }

    .brand-icon {
      width: 16px;
      height: 16px;
      fill: #5f6368;
      transition: fill 0.2s;
    }

    .about-section {
      padding: 10px 20px;
    }

    .section-content {
      line-height: 1.4;
      color: #5f6368;
    }

    .item-start {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }

    .action-icon {
      width: 20px;
      height: 20px;
      fill: #5f6368;
      flex-shrink: 0;
      transform: translateY(-2px);
    }

    @media (prefers-color-scheme: dark) {
      .app-version {
        color: #9ea0a5;
      }
      .section-content {
        color: #9ea0a5;
      }
      .social-icon-link {
        background-color: rgba(255, 255, 255, 0.08);
      }
      .social-icon-link:hover {
        background-color: rgba(138, 180, 248, 0.2);
      }
      .social-icon-link:hover .brand-icon {
        fill: #8ab4f8;
      }
      .brand-icon, .action-icon {
        fill: #9ea0a5;
      }
    }
  </style>
</head>
