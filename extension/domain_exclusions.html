<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="shortcut icon" href="./images/icons/icon_round_1024.png" type="image/png">
  <link rel="apple-touch-icon" href="./images/icons/icon_round_1024.png">
  <link rel="stylesheet" href="./css/UI.css">
  <link rel="stylesheet" href="./css/themes.css">
  <script src="./js/globals.js"></script>
  <!-- <script src="./js/utils.js"></script> -->
  <script src="./js/domain_exclusions.js" type="module"></script>

<body>
  <!-- Chevron Icons -->
  <svg xmlns="http://www.w3.org/2000/svg" height="1" width="1" aria-hidden="true" class="icon-defs">
    <defs>
      <clipPath fill-rule="evenodd" clip-rule="evenodd" id="chevron-down">
        <path
          d="M8.973 11.331L13.8746 6.42937L14.5721 7.12462L9.3195 12.375H8.62425L3.375 7.12462L4.07137 6.42937L8.973 11.331Z">
        </path>
      </clipPath>
      <clipPath fill-rule="evenodd" clip-rule="evenodd" id="chevron-right">
        <path
          d="M11.331 9.027L6.42938 4.12538L7.12463 3.42788L12.375 8.6805V9.37575L7.12463 14.625L6.42938 13.9286L11.331 9.027V9.027Z">
        </path>

    </defs>
  </svg>

  <div class="root">
    <h2 id="header" style="margin-left: 0px; display: flex; justify-content: space-between; align-items: center;">

        <a class="icon-button" type="button" role="navigation" aria-label="Go Back" title="Go Back"

          <svg class="icon" xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 24 24" width="24">

            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />

        <span>Domain Exclusions</span>
      </div>
      <button class="cr-button cr-button-secondary" id="clear-all" type="button" style="height: 26px; padding: 0 12px; border-radius: 13px; font-size: 12px; font-weight: 400; margin-right: 4px; display: none; flex-shrink: 0;">
        Clear All
      </button>
    </h2>
    <span class="header-note">Add domains to exclude from formatting</span>
    <div class="container" id="domain-exclusions-container"></div>
  </div>
